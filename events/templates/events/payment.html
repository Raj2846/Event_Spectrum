<!-- templates/events/payment.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - {{ event.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body text-center">
                        <h3 class="mb-4">Complete Your Payment</h3>
                        <p><strong>Event:</strong> {{ event.title }}</p>
                        <p><strong>Amount:</strong> ₹{{ ticket.amount_paid }}</p>
                        <button id="payButton" class="btn btn-success btn-lg">Pay Now</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('payButton').onclick = function(e) {
            e.preventDefault();
            
            var options = {
                "key": "{{ razorpay_key_id }}",
                "amount": "{{ amount }}",
                "currency": "{{ currency }}",
                "name": "Event Management",
                "description": "{{ event.title }}",
                "order_id": "{{ razorpay_order_id }}",
                "handler": function (response) {
                    fetch('/payment/success/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            razorpay_payment_id: response.razorpay_payment_id,
                            razorpay_order_id: response.razorpay_order_id,
                            razorpay_signature: response.razorpay_signature
                        })
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data.status === 'success') {
                            window.location.href = '/ticket/' + data.ticket_id + '/';
                        } else {
                            alert('Payment verification failed: ' + data.message);
                        }
                    })
                    .catch(error => {
                        alert('Error: ' + error);
                    });
                },
                "prefill": {
                    "name": "{{ ticket.full_name }}",
                    "email": "{{ ticket.email }}",
                    "contact": "{{ ticket.phone }}"
                },
                "theme": {
                    "color": "#0d6efd"
                }
            };
            
            var rzp = new Razorpay(options);
            rzp.open();
        };
    </script>
</body>
</html>
